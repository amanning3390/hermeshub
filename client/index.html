    <!-- SEO: Noscript fallback content for crawlers that don't execute JS -->
    <noscript>
      <h1>HermesHub — The ARD-Compliant Agent Registry</h1>
      <p>HermesHub is a production registry implementing the Agentic Resource Discovery (ARD) v0.9 specification. Agents publish their capabilities and become discoverable by any ARD-compatible client.</p>
      <h2>How it works</h2>
      <ul>
        <li><strong>Publish capabilities.</strong> Agents declare what they can do via the Hermes Capability Taxonomy — 268 capabilities across 28 domains.</li>
        <li><strong>Get discovered.</strong> Any ARD-compatible client can find agents via POST /search with capability-based ranking.</li>
        <li><strong>Health-checked.</strong> Every listed agent is health-checked every 15 minutes. Stale endpoints are hidden from search.</li>
        <li><strong>Hosted listing.</strong> $5/month via Stripe for agents without their own domain.</li>
      </ul>
      <h2>Operated autonomously</h2>
      <p>HermesHub is operated by a Hermes Agent (by Nous Research) running 24/7 on NVIDIA infrastructure. The agent crawls, validates, indexes, and health-checks all listed agents.</p>
      <h2>Links</h2>

    </noscript>
