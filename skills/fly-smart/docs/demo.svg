<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="fly-smart terminal demo">
  <title>fly-smart — hidden-city flight deals</title>
  <desc>Terminal output showing fly-smart finding cheaper flight routes via hub transfer arbitrage</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Window chrome -->
  <rect width="720" height="420" rx="10" fill="url(#bg)" stroke="#313244" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="720" height="32" rx="10" fill="#181825"/>
  <rect y="22" width="720" height="10" fill="#181825"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="360" y="20" text-anchor="middle" fill="#6c7086" font-family="Menlo,monospace" font-size="11">fly-smart — zsh — 120×24</text>

  <!-- Command line -->
  <text x="16" y="58" fill="#cdd6f4" font-family="Menlo,monospace" font-size="13">
    <tspan fill="#89b4fa">~</tspan>
    <tspan fill="#cdd6f4"> </tspan>
    <tspan fill="#cba6f7">λ</tspan>
    <tspan fill="#cdd6f4"> </tspan>
    <tspan fill="#a6e3a1">python3 ~/.hermes/scripts/flight-transfer-finder.py</tspan>
  </text>
  <text x="16" y="76" fill="#cdd6f4" font-family="Menlo,monospace" font-size="13">
    <tspan fill="#89b4fa">  -o LAX -d HKG -dt 2026-06-15 --flexible 3</tspan>
  </text>

  <!-- Separator -->
  <line x1="12" y1="88" x2="708" y2="88" stroke="#313244" stroke-width="1"/>

  <!-- Status line -->
  <text x="16" y="106" fill="#6c7086" font-family="Menlo,monospace" font-size="11">Searching 25 hubs across 7 dates... (8 threads, SQLite cache ON)</text>

  <!-- Results header -->
  <text x="16" y="128" fill="#cdd6f4" font-family="Menlo,monospace" font-size="13" font-weight="bold">✈ MULTI-ORIGIN × MULTI-DATE | LAX / SFO / OAK → HKG</text>
  <text x="16" y="144" fill="#6c7086" font-family="Menlo,monospace" font-size="11">                              Jun 15–21, 2026</text>

  <!-- Table header -->
  <text x="16" y="164" fill="#fab387" font-family="Menlo,monospace" font-size="12">
    <tspan>  #  ROUTE              DATE      PRICE     SAVINGS</tspan>
  </text>
  <line x1="12" y1="170" x2="708" y2="170" stroke="#45475a" stroke-width="0.5"/>

  <!-- Row 1 — BEST -->
  <text x="16" y="188" fill="#a6e3a1" font-family="Menlo,monospace" font-size="12">
    <tspan fill="#f9e2af">  1  LAX → SEA → HKG</tspan>
    <tspan fill="#cdd6f4">  Jun 16  </tspan>
    <tspan fill="#a6e3a1" filter="url(#glow)"> $588  Save $140 (19%)</tspan>
    <tspan fill="#6c7086"> ★ BEST</tspan>
  </text>

  <!-- Row 2 -->
  <text x="16" y="206" fill="#cdd6f4" font-family="Menlo,monospace" font-size="12">
    <tspan>  2  SFO → SEA → HKG</tspan>
    <tspan fill="#cdd6f4">  Jun 16  </tspan>
    <tspan fill="#a6e3a1"> $588  Save $82 (12%)</tspan>
  </text>

  <!-- Row 3 -->
  <text x="16" y="224" fill="#cdd6f4" font-family="Menlo,monospace" font-size="12">
    <tspan>  3  SAN → SEA → HKG</tspan>
    <tspan fill="#cdd6f4">  Jun 16  </tspan>
    <tspan fill="#a6e3a1"> $598  Save $151 (20%)</tspan>
  </text>

  <!-- Row 4 -->
  <text x="16" y="242" fill="#cdd6f4" font-family="Menlo,monospace" font-size="12">
    <tspan>  4  LAX → TPE → HKG</tspan>
    <tspan fill="#cdd6f4">  Jun 17  </tspan>
    <tspan fill="#a6e3a1"> $649  Save $85 (12%)</tspan>
  </text>

  <!-- Row 5 -->
  <text x="16" y="260" fill="#cdd6f4" font-family="Menlo,monospace" font-size="12">
    <tspan>  5  OAK → TPE → HKG</tspan>
    <tspan fill="#cdd6f4">  Jun 17  </tspan>
    <tspan fill="#a6e3a1"> $677  Save $174 (20%)</tspan>
  </text>

  <!-- Separator -->
  <line x1="12" y1="272" x2="708" y2="272" stroke="#313244" stroke-width="0.5"/>

  <!-- Direct baseline -->
  <text x="16" y="290" fill="#6c7086" font-family="Menlo,monospace" font-size="11">
    Direct baseline: LAX → HKG  $728 (Jun 16, Google Flights)
  </text>

  <!-- Self-transfer rules -->
  <text x="16" y="310" fill="#6c7086" font-family="Menlo,monospace" font-size="11">
    ⚠ Book two separate one-way tickets · Carry-on only · 3h+ buffer · Check transit visa
  </text>

  <!-- Prompts -->
  <text x="16" y="338" fill="#cdd6f4" font-family="Menlo,monospace" font-size="13">
    <tspan fill="#89b4fa">~</tspan>
    <tspan fill="#cdd6f4"> </tspan>
    <tspan fill="#cba6f7">λ</tspan>
    <tspan fill="#cdd6f4"> </tspan>
    <tspan fill="#6c7086">  (scan complete — 66s)</tspan>
  </text>
  <rect x="12" y="344" width="8" height="14" fill="#a6e3a1" opacity="0.8"/>

  <!-- Footer badges -->
  <rect x="580" y="390" width="130" height="22" rx="4" fill="#2a2a3c"/>
  <text x="590" y="405" fill="#89b4fa" font-family="Menlo,monospace" font-size="10">9 topics · MIT · v1.2</text>
</svg>
