services:
  - type: web
    name: [project-name]-backend
    env: python
    plan: free
    rootDir: [backend-subdirectory]
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
